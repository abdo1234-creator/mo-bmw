<!-- FILE: admin.html | PURPOSE: Admin CMS dashboard for MO BY AHMED MAHMOUD | DEPENDS ON: backend API at http://localhost:3000/api -->
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — MO BY AHMED MAHMOUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
:root{
  --bg-primary:#050505;--bg-secondary:#0d0d0d;--bg-card:#111111;--border:#1e1e1e;
  --accent-blue:#1c6cfc;--accent-cyan:#00c8ff;--accent-gold:#d4a017;
  --text-primary:#ffffff;--text-secondary:#a0a0a0;--text-muted:#505050;
  --danger:#ff3333;--success:#00cc66;--warn:#ff9900;
  --radius:14px;--radius-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;max-width:100vw}
body{background:var(--bg-primary);color:var(--text-primary);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;max-width:100vw}
img{max-width:100%;height:auto}
input,textarea,select,button{font-family:inherit}
input,textarea,select{font-size:16px}
[dir-auto]{unicode-bidi:plaintext}
.display{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px}
.muted{color:var(--text-secondary)}
.hidden{display:none!important}
a{color:var(--accent-cyan);text-decoration:none}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;min-width:44px;padding:11px 20px;border-radius:50px;border:1.5px solid transparent;cursor:pointer;font-weight:600;font-size:14px;transition:.2s;white-space:nowrap;background:rgba(255,255,255,.05);color:#fff}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:linear-gradient(135deg,var(--accent-blue),#0f9bff);color:#fff}
.btn.outline{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.04)}
.btn.outline:hover{border-color:var(--accent-cyan);color:var(--accent-cyan)}
.btn.danger{background:rgba(255,51,51,.12);border-color:rgba(255,51,51,.4);color:#ff6666}
.btn.gold{background:linear-gradient(135deg,var(--accent-gold),#f5c518);color:#000}
.btn.success{background:rgba(0,204,102,.12);border-color:rgba(0,204,102,.4);color:#33dd88}
.btn.sm{padding:7px 14px;font-size:12px;min-height:36px;min-width:36px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 30%,rgba(28,108,252,.12),transparent 50%),radial-gradient(circle at 70% 70%,rgba(0,200,255,.08),transparent 45%),var(--bg-primary);z-index:2000}
.login-box{width:min(380px,90vw);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.login-logo{text-align:center;margin-bottom:8px;font-family:'Bebas Neue';font-size:34px;letter-spacing:2px}
.login-logo small{display:block;font-family:'Cairo';font-size:13px;color:var(--accent-gold);letter-spacing:1px;margin-top:2px}
.login-sub{text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:28px;letter-spacing:1px}
#loginError{display:none;background:rgba(255,51,51,.1);border:1px solid rgba(255,51,51,.3);color:#ff8080;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px}
#loginError.show{display:block}

/* ── FORM FIELDS ── */
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-field label{font-size:12px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.form-field input,.form-field textarea,.form-field select{padding:12px 14px;min-height:44px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-primary);color:#fff;font-size:16px!important;outline:none;transition:.2s;width:100%}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 3px rgba(0,200,255,.12)}
.form-field .field-error{color:var(--danger);font-size:12px;display:none}
.form-field.invalid input,.form-field.invalid select,.form-field.invalid textarea{border-color:var(--danger)}
.form-field.invalid .field-error{display:block}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
@media(max-width:639px){.form-grid2{grid-template-columns:1fr;gap:0}}
.checkbox-row{display:flex;gap:16px;flex-wrap:wrap;padding:10px 0}
.checkbox-row label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary)}

/* ── APP SHELL ── */
#app{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .25s,transform .3s}
.sidebar-brand{padding:24px 20px 18px;font-family:'Bebas Neue';font-size:20px;letter-spacing:1.5px;border-bottom:1px solid var(--border)}
.sidebar-brand small{display:block;font-family:'Cairo';font-size:10px;color:var(--accent-gold);letter-spacing:1px;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:13px 20px;min-height:44px;color:var(--text-secondary);font-size:14px;cursor:pointer;border-right:3px solid transparent;transition:.2s}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--accent-cyan);background:rgba(0,200,255,.06);border-right-color:var(--accent-cyan)}
.nav-icon{width:20px;text-align:center;flex-shrink:0}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 32px;border-bottom:1px solid var(--border);background:var(--bg-secondary);position:sticky;top:0;z-index:50}
.topbar h1{font-family:'Bebas Neue';font-size:clamp(20px,4vw,26px);letter-spacing:1px}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.content{padding:28px 32px;flex:1;min-width:0}

/* sidebar toggle (hamburger) — mobile only */
.sidebar-toggle{display:none;flex-direction:column;justify-content:center;gap:4px;width:44px;height:44px;flex-shrink:0;cursor:pointer;border:none;background:none;padding:4px}
.sidebar-toggle span{display:block;height:2px;background:#fff;border-radius:2px}

/* overlay behind open drawer */
.sidebar-overlay{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none}
.sidebar-overlay.show{display:block}

/* Tablet: collapse to icon rail */
@media(max-width:1023px){
  .sidebar{width:64px}
  .sidebar-brand,.nav-label{display:none}
  .nav-item{justify-content:center;padding:14px 0}
}

/* Mobile: off-canvas drawer */
@media(max-width:639px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;width:260px;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.6)}
  .sidebar.open{transform:translateX(0)}
  .sidebar.open .sidebar-brand,.sidebar.open .nav-label{display:block}
  .sidebar.open .nav-item{justify-content:flex-start;padding:13px 20px}
  .sidebar-toggle{display:flex}
  .topbar{padding:14px 16px}
  .content{padding:16px}
}

/* ── STAT CARDS ── */
.stat-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-card.gold{border-color:rgba(212,160,23,.3);background:linear-gradient(135deg,rgba(212,160,23,.07),var(--bg-card))}
.stat-card-num{font-family:'Bebas Neue';font-size:clamp(26px,4vw,34px);color:var(--accent-cyan);line-height:1}
.stat-card.gold .stat-card-num{color:var(--accent-gold)}
.stat-card-label{font-size:12px;color:var(--text-secondary);margin-top:4px}
@media(max-width:1279px){.stat-cards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:767px){.stat-cards{grid-template-columns:repeat(2,1fr)}}

/* ── PANEL / TABLE ── */
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:clamp(16px,3vw,24px);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.data-table{min-width:640px}
.panel h3{font-family:'Bebas Neue';font-size:20px;margin-bottom:16px;letter-spacing:1px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.toolbar .search-input{flex:1;min-width:180px;max-width:280px;padding:10px 14px;border-radius:50px;border:1px solid var(--border);background:var(--bg-primary);color:#fff;outline:none}
.toolbar select{padding:10px 14px;border-radius:50px;border:1px solid var(--border);background:var(--bg-primary);color:#fff;outline:none}
.data-table{width:100%;border-collapse:collapse;font-size:13.5px}
.data-table th{text-align:left;padding:10px 12px;color:var(--text-muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.data-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr.dragging{opacity:.3}
.data-table tr[draggable="true"]{cursor:grab}
.thumb{width:46px;height:32px;object-fit:cover;border-radius:6px;background:#1a1a1a}
.empty{text-align:center;color:var(--text-muted);padding:30px!important}
.drag-handle{color:var(--text-muted);cursor:grab;width:20px}
.tag-chip{display:inline-block;padding:3px 9px;border-radius:50px;font-size:11px;border:1px solid rgba(0,200,255,.3);color:var(--accent-cyan);background:rgba(0,200,255,.07);margin:2px}
.badge{display:inline-block;padding:4px 11px;border-radius:50px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.status-pending{background:rgba(212,160,23,.12);color:var(--accent-gold);border:1px solid rgba(212,160,23,.35)}
.status-confirmed{background:rgba(0,204,102,.12);color:var(--success);border:1px solid rgba(0,204,102,.35)}
.status-cancelled{background:rgba(255,51,51,.12);color:#ff6666;border:1px solid rgba(255,51,51,.35)}
.badge-instock{color:var(--success)}
.badge-wait{color:var(--warn)}
.pagination{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px;font-size:13px;color:var(--text-secondary)}
.error-block{background:rgba(255,51,51,.08);border:1px solid rgba(255,51,51,.3);color:#ff8888;padding:18px;border-radius:var(--radius);text-align:center}
.loading-spinner{display:flex;justify-content:center;padding:60px}
.loading-spinner::after{content:"";width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent-cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sub-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sub-tab{padding:9px 18px;border-radius:50px;border:1.5px solid var(--border);background:rgba(255,255,255,.03);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:.2s}
.sub-tab.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#fff}
.list-editor{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.list-editor-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.list-editor-row input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-primary);color:#fff}
.day-block{border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.day-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px;letter-spacing:1px;color:var(--accent-cyan);text-transform:uppercase}
.slot-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:50px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:12px;margin:3px}
.slot-chip button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;line-height:1}
.add-inline{display:flex;gap:8px;margin-top:6px}
.add-inline input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-primary);color:#fff}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.media-item{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.media-item img{width:100%;height:120px;object-fit:cover;display:block;background:#1a1a1a}
.media-item .media-meta{padding:10px;font-size:12px}
.media-item .media-meta .fn{color:var(--text-secondary);word-break:break-all;margin-bottom:6px}
.media-item .media-actions{display:flex;gap:6px;padding:0 10px 10px}
.dropzone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:36px;text-align:center;color:var(--text-secondary);margin-bottom:20px;transition:.2s;cursor:pointer}
.dropzone.drag{border-color:var(--accent-cyan);background:rgba(0,200,255,.04)}

/* ── PREVIEW CARD ── */
.preview-card{border:1px solid var(--border);border-radius:var(--radius);padding:16px;background:var(--bg-primary);font-size:13px}

/* ── MODAL ── */
#modalRoot{position:fixed;inset:0;z-index:1500;display:none;align-items:flex-start;justify-content:center;padding:50px 16px;overflow-y:auto;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#modalRoot.open{display:flex}
.modal-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);width:min(640px,100%);margin-bottom:40px}
.modal-box.wide{width:min(900px,100%)}
@media(max-width:479px){
  #modalRoot{padding:0;align-items:flex-end}
  .modal-box{border-radius:var(--radius-lg) var(--radius-lg) 0 0;margin-bottom:0;width:100%}
}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 26px;border-bottom:1px solid var(--border)}
.modal-head h3{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px}
.modal-x{background:none;border:1px solid var(--border);width:34px;height:34px;border-radius:50%;color:#fff;cursor:pointer;font-size:14px}
.modal-x:hover{border-color:var(--danger);color:var(--danger)}
.modal-body{padding:22px 26px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.confirm-text{font-size:14px;color:var(--text-secondary);margin-bottom:20px;line-height:1.6}
.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;gap:16px}
.detail-row span:first-child{color:var(--text-muted)}
.detail-row span:last-child{text-align:right;word-break:break-word}

/* ── TOAST ── */
#toastContainer{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 20px;border-radius:var(--radius);font-size:13.5px;min-width:260px;box-shadow:0 12px 30px rgba(0,0,0,.4);animation:toastIn .25s ease;border:1px solid}
.toast.success{background:#0a1f14;border-color:rgba(0,204,102,.4);color:#5fe3a0}
.toast.error{background:#220a0a;border-color:rgba(255,51,51,.4);color:#ff8a8a}
.toast.info{background:#0a1620;border-color:rgba(0,200,255,.4);color:#7fdfff}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <img src="assets/logo-mo.png" alt="MO by Ahmed Mahmoud" style="width:200px;height:auto;display:block;margin:0 auto 16px">

    <form id="loginForm">
      <div class="form-field"><label>Username</label><input name="username" required autocomplete="username"></div>

      <button type="submit" class="btn primary" style="width:100%;margin-top:6px">Sign In</button>

  <aside class="sidebar">

    <div class="nav-item active" data-nav="dashboard"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></div>

<script>
// ═══════════════════════ CORE: API, AUTH, TOAST, MODAL ═══════════════════════
const BACKEND_ORIGIN = 'http://localhost:3000';
const API = BACKEND_ORIGIN + '/api';

let TOKEN = localStorage.getItem('mo_admin_token');
let TOKEN_EXP = Number(localStorage.getItem('mo_admin_exp') || 0);

function isAuthed(){ return !!TOKEN && Date.now() < TOKEN_EXP; }
function saveAuth(token, expiresAt){
  TOKEN = token; TOKEN_EXP = expiresAt;
  localStorage.setItem('mo_admin_token', token);
  localStorage.setItem('mo_admin_exp', String(expiresAt));
}
function clearAuth(){
  TOKEN = null; TOKEN_EXP = 0;
  localStorage.removeItem('mo_admin_token');
  localStorage.removeItem('mo_admin_exp');
}

async function api(path, opts = {}){
  const isForm = opts.body instanceof FormData;
  const headers = Object.assign({}, opts.headers || {});
  if (!isForm) headers['Content-Type'] = 'application/json';
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (res.status === 401) {
    clearAuth();
    showLogin();
    throw new Error('Session expired — please sign in again');
  }
  let data = null;
  try { data = await res.json(); } catch { /* no body */ }
  if (!res.ok) throw new Error((data && data.error) || ('Request failed (' + res.status + ')'));
  return data;
}
async function apiBlob(path){
  const res = await fetch(API + path, { headers: { Authorization: 'Bearer ' + TOKEN } });
  if (res.status === 401) { clearAuth(); showLogin(); throw new Error('Session expired'); }
  if (!res.ok) throw new Error('Export failed');
  return res.blob();
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(url);
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function escapeAttr(s){ return escapeHtml(s).replace(/`/g, '&#96;'); }
function formatDate(s){ try { return new Date(s).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }); } catch { return s || ''; } }
function formatMoney(n){ return Number(n || 0).toLocaleString('en-US') + ' EGP'; }
function formatBytes(n){ if (!n) return '0 B'; const u = ['B','KB','MB','GB']; let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; } return n.toFixed(1) + ' ' + u[i]; }
function errorBlock(msg){ return `<div class="error-block">⚠️ ${escapeHtml(msg)}<br><button class="btn outline sm" style="margin-top:12px" onclick="navigate(currentTab)">إعادة المحاولة / Retry</button></div>`; }
function setContent(html){ document.getElementById('content').innerHTML = html; }

// Save and restore scroll position across setContent calls
let _savedScrollY = 0;
function saveScroll() { _savedScrollY = document.getElementById('content').parentElement.scrollTop || window.scrollY; }
function restoreScroll() {
  requestAnimationFrame(() => {
    try { document.getElementById('content').parentElement.scrollTop = _savedScrollY; } catch(e){}
    window.scrollTo({ top: _savedScrollY, behavior: 'instant' });
  });
}

// Inline success banner shown inside a modal (or embedded form) above its action buttons
function showModalSuccessBanner(container, message = '✓ Saved successfully') {
  const existing = container.querySelector('#modalSuccessBanner');
  if (existing) existing.remove();
  const banner = document.createElement('div');
  banner.id = 'modalSuccessBanner';
  banner.style.cssText = 'background:rgba(0,204,102,.12);border:1px solid rgba(0,204,102,.4);color:#33dd88;border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13.5px;text-align:center';
  banner.textContent = message;
  const actions = container.querySelector('.modal-actions');
  if (actions) actions.before(banner);
  else container.appendChild(banner);
  setTimeout(() => banner.remove(), 2500);
}

// ── Toasts ──
function toast(type, msg){
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = '.3s'; setTimeout(() => t.remove(), 300); }, 3500);
}

// ── Modal stack ──
const modalRoot = document.getElementById('modalRoot');
function openModal(html){
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  modalRoot.appendChild(wrap.firstElementChild);
  modalRoot.classList.add('open');
}
function closeTopModal(){
  if (modalRoot.lastElementChild) modalRoot.lastElementChild.remove();
  if (!modalRoot.children.length) modalRoot.classList.remove('open');
}
function closeAllModals(){ modalRoot.innerHTML = ''; modalRoot.classList.remove('open'); }
function confirmDialog(message){
  return new Promise(resolve => {
    openModal(`
      <div class="modal-box" data-confirm-modal>
        <div class="modal-head"><h3>تأكيد / Confirm</h3><button class="modal-x" data-close-confirm>✕</button></div>
        <div class="modal-body">
          <p class="confirm-text">${escapeHtml(message)}</p>
          <div class="modal-actions">
            <button class="btn outline" data-confirm-no>إلغاء</button>
            <button class="btn danger" data-confirm-yes>تأكيد</button>
          </div>
        </div>
      </div>`);
    const top = modalRoot.lastElementChild;
    top.querySelector('[data-confirm-yes]').onclick = () => { top.remove(); if (!modalRoot.children.length) modalRoot.classList.remove('open'); resolve(true); };
    top.querySelector('[data-confirm-no]').onclick = () => { top.remove(); if (!modalRoot.children.length) modalRoot.classList.remove('open'); resolve(false); };
    top.querySelector('[data-close-confirm]').onclick = () => { top.remove(); if (!modalRoot.children.length) modalRoot.classList.remove('open'); resolve(false); };
  });
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTopModal(); });
modalRoot.addEventListener('click', e => { if (e.target === modalRoot) closeTopModal(); });

// ── Generic drag-to-reorder for <tbody> rows ──
function wireDragReorder(tbody, onReorder){
  if (!tbody) return;
  let dragEl = null;
  tbody.querySelectorAll('tr[draggable="true"]').forEach(row => {
    row.addEventListener('dragstart', () => { dragEl = row; row.classList.add('dragging'); });
    row.addEventListener('dragend', () => { row.classList.remove('dragging'); });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragEl || e.currentTarget === dragEl) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const before = (e.clientY - rect.top) < rect.height / 2;
      tbody.insertBefore(dragEl, before ? e.currentTarget : e.currentTarget.nextSibling);
    });
  });
  tbody.addEventListener('drop', e => {
    e.preventDefault();
    const ids = Array.from(tbody.querySelectorAll('tr[draggable="true"]')).map(r => +r.dataset.id);
    onReorder(ids);
  });
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const errBox = document.getElementById('loginError');
  errBox.classList.remove('show');
  const fd = new FormData(e.target);
  const submitBtn = e.target.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveAuth(data.token, data.expiresAt);
    showApp();
  } catch (err) {
    errBox.textContent = err.message === 'Invalid username or password' ? 'بيانات تسجيل الدخول غير صحيحة' : err.message;
    errBox.classList.add('show');
  } finally {
    submitBtn.disabled = false;
  }
});

    try {
      let img_url = fd.get('img_url') || '';

      if (file && file.size) {

document.getElementById('content').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'model-add') { await ensureCatalogDataLoaded(true); openModelModal(null); }
  if (action === 'model-edit') { await ensureCatalogDataLoaded(true); openModelModal(cachedModels.find(m => String(m.id) === id)); }
  if (action === 'model-delete') {
    if (!(await confirmDialog('هل أنت متأكد؟ لا يمكن التراجع — Delete this model permanently?'))) return;
    try { await api(`/models/${id}`, { method: 'DELETE' }); toast('success', 'Deleted'); renderModels(true); }
    catch (err) { toast('error', err.message); }
  }
});

// ── Catalog data shared by the part-assignment UI (series/models/engine map) ──
async function ensureCatalogDataLoaded(forceRefresh){
  if (window.catalogDataLoaded && !forceRefresh) return;
  try {
    const [seriesRes, modelsRes, engineRes] = await Promise.all([
      api('/service-config/catalog_series'),
      api('/models'),
      api('/service-config/catalog_engine_map')
    ]);
    window.cachedSeries = seriesRes.value || [];
    window.cachedModels = modelsRes || [];
    window.cachedEngineMap = engineRes.value || {};
    window.catalogDataLoaded = true;
  } catch (err) {
    toast('error', 'Could not load catalog data: ' + err.message);
  }
}
function getEnginesForModel(modelName){
  const upper = (modelName || '').toUpperCase();
  const matched = [];
  for (const [engine, variants] of Object.entries(window.cachedEngineMap || {})) {
    if ((variants || []).some(v => upper.includes(v.toUpperCase()) || v.toUpperCase().includes((upper.split(' ')[1]) || ''))) {
      matched.push(engine);
    }
  }
  return matched.length ? matched : Object.keys(window.cachedEngineMap || {});
}

    <td>${escapeHtml(p.en || '')}</td>
    <td style="font-family:monospace;font-size:12px">${escapeHtml(p.oem || '')}</td>
    <td>${priceHtml}</td>
    <td><span class="tag-chip">${PART_BADGES[p.badge] || p.badge}</span></td>
    <td><button class="btn sm ${p.stock ? 'success' : 'outline'}" data-action="part-toggle-stock" data-id="${p.id}">${p.stock ? '✓ متوفر' : '⏳ 3 days'}</button></td>

}

function assignmentChipHTML(seriesLabel, modelLabel, engineCode, seriesId, modelId, engineCodeRaw){
  const label = `${seriesLabel} › ${modelLabel || 'All Models'} › ${engineCode || 'All Engines'}`;
  return `<div data-assignment="1" data-series-id="${escapeAttr(seriesId)}" data-model-id="${modelId ? escapeAttr(String(modelId)) : ''}" data-engine-code="${escapeAttr(engineCodeRaw || '')}"
    style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius);background:rgba(0,200,255,.04);border:1px solid rgba(0,200,255,.15);font-family:Rajdhani;font-size:13px;letter-spacing:1px;gap:12px">
    <span style="color:var(--accent-cyan)">🚗</span><span style="flex:1">${escapeHtml(label)}</span>
    <button type="button" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;line-height:1;padding:0 4px" onclick="this.closest('[data-assignment]').remove();document.getElementById('assignmentsEmpty') && (document.getElementById('assignmentsEmpty').style.display = document.getElementById('assignmentsList').querySelectorAll('[data-assignment]').length === 0 ? 'block' : 'none')">✕</button>
  </div>`;
}
function addAssignmentChip(listEl, emptyEl, seriesLabel, modelLabel, engineCode, seriesId, modelId, engineCodeRaw){
  const wrap = document.createElement('div');
  wrap.innerHTML = assignmentChipHTML(seriesLabel, modelLabel, engineCode, seriesId, modelId, engineCodeRaw);
  listEl.insertBefore(wrap.firstElementChild, emptyEl);
  if (emptyEl) emptyEl.style.display = 'none';
}

async function openPartModal(part){
  const isEdit = !!part;
  await ensureCatalogDataLoaded();
  openModal(`
    <div class="modal-box wide">
      <div class="modal-head"><h3>${isEdit ? 'Edit' : 'Add'} Spare Part</h3><button class="modal-x" data-close>✕</button></div>
      <form class="modal-body" id="partForm">
        <div class="form-grid2">
          <div class="form-field"><label>Arabic Name</label><input name="ar" dir-auto required value="${escapeAttr(part?.ar || '')}"></div>
          <div class="form-field"><label>English Name</label><input name="en" value="${escapeAttr(part?.en || '')}"></div>
          <div class="form-field"><label>Category</label><select name="cat">${PART_CATS.filter(c => c !== 'All').map(c => `<option value="${c}" ${part?.cat === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
          <div class="form-field"><label>OEM Number</label><input name="oem" value="${escapeAttr(part?.oem || '')}"></div>
          <div class="form-field"><label>Price (EGP)</label><input type="number" name="price_egp" min="0" step="0.01" required value="${part?.price_egp ?? ''}"></div>
          <div class="form-field"><label>Note</label><input name="note" value="${escapeAttr(part?.note || '')}" placeholder="5L, Set×4, +50HP..."></div>
          <div class="form-field"><label>Badge</label><select name="badge">${Object.keys(PART_BADGES).map(b => `<option value="${b}" ${part?.badge === b ? 'selected' : ''}>${PART_BADGES[b]}</option>`).join('')}</select></div>
          <div class="form-field"><label>Stock</label>
            <select name="stock"><option value="true" ${!part || part.stock ? 'selected' : ''}>In Stock</option><option value="false" ${part && !part.stock ? 'selected' : ''}>Order in 3 days</option></select>
          </div>
          <div class="form-field"><label>Part Image URL</label><input name="img_url" placeholder="https://..." value="${escapeAttr(part?.img_url || '')}"></div>
          <div class="form-field"><label>Or Upload Part Image</label><input type="file" name="upload_img" accept="image/jpeg,image/png,image/webp"></div>
        </div>
        <div id="imgPreviewWrap" style="margin-bottom:16px;${part?.img_url ? '' : 'display:none'}">
          <img id="imgPreview" src="${escapeAttr(part?.img_url || '')}" style="max-width:200px;max-height:140px;object-fit:contain;border-radius:var(--radius);background:var(--bg-primary);border:1px solid var(--border);padding:8px">
        </div>

        <hr style="border-color:var(--border);margin:20px 0">
        <div style="font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;margin-bottom:4px">ASSIGN TO SERIES / MODEL / ENGINE</div>
        <p style="font-family:Cairo;font-size:12px;color:var(--text-muted);margin-bottom:18px">Leave empty = this part appears for ALL models. Add assignments to show it only for specific series, models, or engines.</p>

        <div class="form-field"><label>Step 1 — Series</label><div id="assignSeriesChips" style="display:flex;flex-wrap:wrap;gap:8px;padding:8px 0"></div></div>
        <div class="form-field" id="assignModelField" style="display:none"><label>Step 2 — Model <span class="muted" style="font-size:10px">(optional — leave blank = all models)</span></label><select id="assignModelSelect"><option value="">All models in this series</option></select></div>
        <div class="form-field" id="assignEngineField" style="display:none"><label>Step 3 — Engine <span class="muted" style="font-size:10px">(optional — leave blank = all engines)</span></label><select id="assignEngineSelect"><option value="">All engines for this model</option></select></div>
        <button type="button" class="btn outline sm" id="addAssignmentBtn" style="margin-bottom:16px"><i class="fa-solid fa-circle-plus"></i> Add This Assignment</button>

        <div style="font-family:Rajdhani;font-size:11px;letter-spacing:2px;color:var(--text-muted);margin-bottom:8px">CURRENT ASSIGNMENTS</div>
        <div id="assignmentsList" style="display:flex;flex-direction:column;gap:8px;min-height:40px;padding:12px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius)">
          <div id="assignmentsEmpty" style="font-family:Cairo;font-size:12px;color:var(--text-muted);text-align:center;padding:8px">No assignments yet — showing for all models</div>
        </div>

        <div class="modal-actions"><button type="submit" class="btn primary">Save</button></div>
      </form>
    </div>`);
  const top = modalRoot.lastElementChild;
  top.querySelector('[data-close]').onclick = closeTopModal;

  // ── Live image preview (URL input + file upload) ──
  top.querySelector('[name="upload_img"]').addEventListener('change', function(){
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      top.querySelector('#imgPreviewWrap').style.display = 'block';
      top.querySelector('#imgPreview').src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  top.querySelector('[name="img_url"]').addEventListener('input', function(){
    const wrap = top.querySelector('#imgPreviewWrap');
    if (this.value) { top.querySelector('#imgPreview').src = this.value; wrap.style.display = 'block'; }
    else wrap.style.display = 'none';
  });

  // ── Step A: series chips ──
  const seriesChipsWrap = top.querySelector('#assignSeriesChips');
  let selectedSeriesId = null;
  (window.cachedSeries || []).forEach(s => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'sub-tab';
    chip.textContent = s.name;
    chip.dataset.seriesId = s.id;
    chip.addEventListener('click', () => {
      seriesChipsWrap.querySelectorAll('.sub-tab').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedSeriesId = s.id;
      const modelSelect = top.querySelector('#assignModelSelect');
      modelSelect.innerHTML = `<option value="">All models in ${escapeHtml(s.name)}</option>`;
      (window.cachedModels || [])
        .filter(m => m.series_id === s.id || (s.keywords || []).some(k => m.name.toUpperCase().includes(k.toUpperCase())))
        .forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name + (m.years ? ' (' + m.years + ')' : '');
          opt.dataset.modelName = m.name;
          modelSelect.appendChild(opt);
        });
      top.querySelector('#assignModelField').style.display = 'flex';
      top.querySelector('#assignEngineField').style.display = 'none';
      top.querySelector('#assignEngineSelect').innerHTML = '<option value="">All engines for this model</option>';
    });
    seriesChipsWrap.appendChild(chip);
  });

  // ── Step B -> C cascade ──
  top.querySelector('#assignModelSelect').addEventListener('change', function(){
    const selectedOpt = this.options[this.selectedIndex];
    const modelName = selectedOpt.dataset.modelName || '';
    const engineSelect = top.querySelector('#assignEngineSelect');
    engineSelect.innerHTML = '<option value="">All engines for this model</option>';
    if (this.value) {
      getEnginesForModel(modelName).forEach(code => {
        const opt = document.createElement('option');
        opt.value = code; opt.textContent = code;
        engineSelect.appendChild(opt);
      });
      top.querySelector('#assignEngineField').style.display = 'flex';
    } else {
      top.querySelector('#assignEngineField').style.display = 'none';
    }
  });

  // ── Add Assignment ──
  top.querySelector('#addAssignmentBtn').addEventListener('click', () => {
    if (!selectedSeriesId) { toast('info', 'Please select a series first'); return; }
    const modelSelect = top.querySelector('#assignModelSelect');
    const engineSelect = top.querySelector('#assignEngineSelect');
    const series = (window.cachedSeries || []).find(s => s.id === selectedSeriesId);
    const modelId = modelSelect.value || null;
    const modelName = modelId ? (modelSelect.options[modelSelect.selectedIndex].dataset.modelName || modelSelect.options[modelSelect.selectedIndex].text) : null;
    const engineCode = engineSelect.value || null;

    const existing = Array.from(top.querySelectorAll('#assignmentsList [data-assignment]'));
    const isDupe = existing.some(c =>
      c.dataset.seriesId === selectedSeriesId &&
      (c.dataset.modelId || '') === (modelId ? String(modelId) : '') &&
      (c.dataset.engineCode || '') === (engineCode || '')
    );
    if (isDupe) { toast('info', 'This assignment already exists'); return; }

    addAssignmentChip(top.querySelector('#assignmentsList'), top.querySelector('#assignmentsEmpty'),
      series ? series.name : selectedSeriesId, modelName, engineCode, selectedSeriesId, modelId, engineCode);
  });

  // ── Pre-populate assignments when editing ──
  if (isEdit && part?.id) {
    try {
      const list = await api(`/parts/${part.id}/assignments`);
      (list || []).forEach(a => {
        const series = (window.cachedSeries || []).find(s => s.id === a.series_id);
        addAssignmentChip(top.querySelector('#assignmentsList'), top.querySelector('#assignmentsEmpty'),
          series ? series.name : a.series_id, a.model_name, a.engine_code, a.series_id, a.model_id, a.engine_code);
      });
    } catch { /* no assignments yet */ }
  }

  top.querySelector('#partForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    try {
      let img_url = fd.get('img_url') || '';
      const file = fd.get('upload_img');
      if (file && file.size) {
        const uploadFd = new FormData(); uploadFd.append('files', file);
        const uploaded = await api('/media/upload', { method: 'POST', body: uploadFd });
        img_url = BACKEND_ORIGIN + uploaded[0].url;
      }
      const payload = {
        ar: fd.get('ar'), en: fd.get('en'), cat: fd.get('cat'), oem: fd.get('oem'),
        price_egp: Number(fd.get('price_egp')), note: fd.get('note'), badge: fd.get('badge'),
        stock: fd.get('stock') === 'true', img_url
      };
      const saved = isEdit
        ? await api(`/parts/${part.id}`, { method: 'PUT', body: JSON.stringify(payload) })
        : await api('/parts', { method: 'POST', body: JSON.stringify(payload) });

      const assignments = Array.from(top.querySelectorAll('#assignmentsList [data-assignment]')).map(c => ({
        series_id: c.dataset.seriesId,
        model_id: c.dataset.modelId ? Number(c.dataset.modelId) : null,
        engine_code: c.dataset.engineCode || null
      }));
      try {
        await api(`/parts/${saved.id}/assignments/replace`, { method: 'PUT', body: JSON.stringify({ assignments }) });
      } catch (err) {
        toast('info', 'Part saved but assignments could not be saved: ' + err.message);
      }

      showModalSuccessBanner(top, isEdit ? 'Part updated ✓' : 'Part added ✓');
      renderParts(true);
      if (isEdit) {
        setTimeout(closeTopModal, 1500);
      } else {
        e.target.reset();
        top.querySelector('#imgPreviewWrap').style.display = 'none';
        top.querySelectorAll('#assignmentsList [data-assignment]').forEach(c => c.remove());
        const emptyEl = top.querySelector('#assignmentsEmpty');
        if (emptyEl) emptyEl.style.display = 'block';
        seriesChipsWrap.querySelectorAll('.sub-tab').forEach(c => c.classList.remove('active'));
        selectedSeriesId = null;
        top.querySelector('#assignModelField').style.display = 'none';
        top.querySelector('#assignEngineField').style.display = 'none';
      }
    } catch (err) { toast('error', err.message); }
    finally { submitBtn.disabled = false; }
  });
}

document.getElementById('content').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'part-add') openPartModal(null);
  if (action === 'part-edit') openPartModal(cachedPartsPage.find(p => String(p.id) === id));
  if (action === 'part-delete') {
    if (!(await confirmDialog('هل أنت متأكد؟ لا يمكن التراجع — Delete this part permanently?'))) return;
    try { await api(`/parts/${id}`, { method: 'DELETE' }); toast('success', 'Deleted'); renderParts(true); }
    catch (err) { toast('error', err.message); }
  }
  if (action === 'part-toggle-stock') {
    const p = cachedPartsPage.find(x => String(x.id) === id);
    try { await api(`/parts/${id}`, { method: 'PUT', body: JSON.stringify({ stock: !p.stock }) }); toast('success', 'Stock updated'); renderParts(true); }
    catch (err) { toast('error', err.message); }
  }
  if (action === 'parts-page') {
    partsState.page += Number(btn.dataset.dir);
    await renderParts();
    document.querySelector('#content .panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  if (action === 'part-bulk-apply') {
    const type = document.getElementById('bulkType').value;
    const value = Number(document.getElementById('bulkValue').value);
    if (!value && value !== 0) { toast('error', 'Enter a value'); return; }
    try {
      await api('/parts/bulk-price', { method: 'POST', body: JSON.stringify({ ids: Array.from(selectedPartIds), type, value }) });
      toast('success', 'Prices updated'); renderParts(true);
    } catch (err) { toast('error', err.message); }
  }
});

let cachedDiscounts = [];

async function renderDiscounts(preserveScroll = false){
  if (preserveScroll) saveScroll();
  try {
    cachedDiscounts = await api('/discounts');
    setContent(`
      <div class="toolbar"><button class="btn primary" data-action="discount-add"><i class="fa-solid fa-plus"></i> Add Discount</button></div>
      <div class="panel">
        <table class="data-table">
          <thead><tr><th>Label</th><th>Type</th><th>Value</th><th>Scope</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${cachedDiscounts.length ? cachedDiscounts.map(discountRow).join('') : '<tr><td colspan="7" class="empty">No discounts yet</td></tr>'}
          </tbody>
        </table>
      </div>`);
    if (preserveScroll) restoreScroll();
  } catch (err) { setContent(errorBlock(err.message)); }
}
TAB_RENDERERS.discounts = renderDiscounts;

function discountScopeLabel(d){
  if (d.applies_to === 'all_parts') return '🌍 All Parts';
  if (d.applies_to === 'category') return '📂 ' + escapeHtml(d.target_id || '') + ' category';
  if (d.applies_to === 'specific_part') return '🔩 Part #' + escapeHtml(d.target_id || '');
  if (d.applies_to === 'booking') return '📅 ' + escapeHtml(d.target_id || '') + ' booking';
  return escapeHtml(d.applies_to);
}
function discountRow(d){
  const expired = d.expiry_date && new Date(d.expiry_date) < new Date();
  return `<tr data-id="${d.id}">
    <td dir-auto>${escapeHtml(d.label)}</td>
    <td>${d.type}</td>
    <td>${d.type === 'percent' ? d.value + '%' : formatMoney(d.value)}</td>
    <td><span class="tag-chip" style="color:var(--accent-gold);border-color:rgba(212,160,23,.3)">${discountScopeLabel(d)}</span></td>
    <td>${d.expiry_date ? escapeHtml(d.expiry_date) : '—'} ${expired ? '<span class="badge status-cancelled">expired</span>' : ''}</td>
    <td><button class="btn sm ${d.active ? 'success' : 'outline'}" data-action="discount-toggle" data-id="${d.id}">${d.active ? 'Active' : 'Inactive'}</button></td>
    <td>
      <button class="btn outline sm" data-action="discount-edit" data-id="${d.id}">Edit</button>
      <button class="btn danger sm" data-action="discount-delete" data-id="${d.id}">Delete</button>
    </td>
  </tr>`;
}

function discountTargetField(appliesTo, currentTarget){
  if (appliesTo === 'category') {
    return `<select name="target_id">${PART_CATS.filter(c => c !== 'All').map(c => `<option value="${c}" ${currentTarget === c ? 'selected' : ''}>${c}</option>`).join('')}</select>`;
  }
  if (appliesTo === 'specific_part') {
    return `<select name="target_id">${cachedPartsPage.concat(cachedModels.length ? [] : []).length ? '' : ''}${(cachedPartsPage.length ? cachedPartsPage : []).map(p => `<option value="${p.id}" ${String(currentTarget) === String(p.id) ? 'selected' : ''}>${escapeHtml(p.ar)} (#${p.id})</option>`).join('') || '<option value="">Load Parts tab first to populate this list</option>'}</select>`;
  }
  if (appliesTo === 'booking') {
    return `<select name="target_id">${['quick', 'full', 'tuning', 'pickup'].map(s => `<option value="${s}" ${currentTarget === s ? 'selected' : ''}>${s}</option>`).join('')}</select>`;
  }
  return `<input name="target_id" value="" disabled placeholder="N/A for all parts">`;
}

function openDiscountModal(discount){
  const isEdit = !!discount;
  const appliesTo = discount?.applies_to || 'all_parts';
  openModal(`
    <div class="modal-box">
      <div class="modal-head"><h3>${isEdit ? 'Edit' : 'Add'} Discount</h3><button class="modal-x" data-close>✕</button></div>
      <form class="modal-body" id="discountForm">
        <div class="form-field"><label>Label</label><input name="label" dir-auto required value="${escapeAttr(discount?.label || '')}" placeholder="عرض رمضان"></div>
        <div class="form-grid2">
          <div class="form-field"><label>Type</label><select name="type"><option value="percent" ${discount?.type === 'percent' ? 'selected' : ''}>Percent %</option><option value="fixed" ${discount?.type === 'fixed' ? 'selected' : ''}>Fixed Amount</option></select></div>
          <div class="form-field"><label>Value</label><input type="number" name="value" step="0.01" required value="${discount?.value ?? ''}"></div>
          <div class="form-field"><label>Applies To</label><select name="applies_to" id="appliesToSelect">
            ${['all_parts', 'category', 'specific_part', 'booking'].map(a => `<option value="${a}" ${appliesTo === a ? 'selected' : ''}>${a}</option>`).join('')}
          </select></div>
          <div class="form-field"><label>Target</label><div id="targetFieldWrap">${discountTargetField(appliesTo, discount?.target_id)}</div></div>
          <div class="form-field"><label>Expiry Date</label><input type="date" name="expiry_date" value="${discount?.expiry_date || ''}"></div>
          <div class="form-field"><label>Active</label><div class="checkbox-row"><label><input type="checkbox" name="active" ${!discount || discount.active ? 'checked' : ''}> Active</label></div></div>
        </div>
        <div class="modal-actions"><button type="submit" class="btn primary">Save</button></div>
      </form>
    </div>`);
  const top = modalRoot.lastElementChild;
  top.querySelector('[data-close]').onclick = closeTopModal;
  top.querySelector('#appliesToSelect').addEventListener('change', e => {
    document.getElementById('targetFieldWrap').innerHTML = discountTargetField(e.target.value, null);
  });
  top.querySelector('#discountForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {
      label: fd.get('label'), type: fd.get('type'), value: Number(fd.get('value')),
      applies_to: fd.get('applies_to'), target_id: fd.get('target_id') || null,
      expiry_date: fd.get('expiry_date') || null, active: fd.get('active') === 'on'
    };
    try {
      if (isEdit) await api(`/discounts/${discount.id}`, { method: 'PUT', body: JSON.stringify(payload) });
      else await api('/discounts', { method: 'POST', body: JSON.stringify(payload) });
      showModalSuccessBanner(top, isEdit ? 'Discount updated ✓' : 'Discount added ✓');
      renderDiscounts(true);
      if (isEdit) {
        setTimeout(closeTopModal, 1500);
      } else {
        e.target.reset();
        document.getElementById('targetFieldWrap').innerHTML = discountTargetField('all_parts', null);
      }
    } catch (err) { toast('error', err.message); }
  });
}

document.getElementById('content').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;
  if (action === 'discount-add') openDiscountModal(null);
  if (action === 'discount-edit') openDiscountModal(cachedDiscounts.find(d => String(d.id) === id));
  if (action === 'discount-toggle') {
    const d = cachedDiscounts.find(x => String(x.id) === id);
    try { await api(`/discounts/${id}`, { method: 'PUT', body: JSON.stringify({ active: !d.active }) }); toast('success', 'Updated'); renderDiscounts(true); }
    catch (err) { toast('error', err.message); }
  }
  if (action === 'discount-delete') {
    if (!(await confirmDialog('هل أنت متأكد؟ لا يمكن التراجع — Delete this discount?'))) return;
    try { await api(`/discounts/${id}`, { method: 'DELETE' }); toast('success', 'Deleted'); renderDiscounts(true); }
    catch (err) { toast('error', err.message); }
  }
});

// ═══════════════════════ BOOKINGS ═══════════════════════
let bookingsState = { status: '', service_type: '', from: '', to: '', page: 1 };
let cachedBookingsPage = [];

function waLinkForBooking(b){
  const intl = '20' + String(b.customer_phone || '').replace(/^0/, '');
  const msg = encodeURIComponent(`مرحباً، بخصوص حجزك ${b.ref_number} (${b.service_type})`);
  return `https://wa.me/${intl}?text=${msg}`;
}

async function renderBookings(preserveScroll = false){
  if (preserveScroll) saveScroll();
  try {
    const q = new URLSearchParams();
    if (bookingsState.status.startsWith('pay:')) q.set('payment_status', bookingsState.status.slice(4));

function listEditorHTML(items){
  return `<div class="list-editor" data-list-editor>
    ${(items || []).map(item => `<div class="list-editor-row"><input value="${escapeAttr(item)}" dir-auto><button type="button" class="btn danger sm" data-list-remove>✕</button></div>`).join('')}
    <div class="add-inline"><input placeholder="Add item..." dir-auto data-list-newitem><button type="button" class="btn outline sm" data-list-add>+ Add</button></div>
  </div>`;
}
function collectListEditor(container){
  return Array.from(container.querySelectorAll('.list-editor-row input')).map(i => i.value.trim()).filter(Boolean);
}
const ALL_DAYS = ['SAT', 'SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI'];
function dayBlockHTML(day, times){
  return `<div class="day-block" data-day="${day}">
    <div class="day-block-head"><span>${day}</span><button type="button" class="btn danger sm" data-day-remove>✕ remove day</button></div>
    <div class="slot-chips">${times.map(t => `<span class="slot-chip" data-time="${escapeAttr(t)}">${escapeHtml(t)} <button type="button" data-slot-remove>✕</button></span>`).join('')}</div>
    <div class="add-inline"><input placeholder="e.g. 9:00 AM" data-slot-newtime><button type="button" class="btn outline sm" data-slot-add>+ Add time</button></div>
  </div>`;
}
function slotsEditorHTML(slotsObj){
  return `<div class="list-editor" data-slots-editor>
    ${Object.entries(slotsObj || {}).map(([day, times]) => dayBlockHTML(day, times)).join('')}
    <div class="add-inline"><select data-newday-select>${ALL_DAYS.map(d => `<option value="${d}">${d}</option>`).join('')}</select><button type="button" class="btn outline sm" data-day-add>+ Add Day</button></div>
  </div>`;
}
function collectSlotsEditor(container){
  const out = {};
  container.querySelectorAll('.day-block').forEach(block => {
    const times = Array.from(block.querySelectorAll('.slot-chip')).map(c => c.dataset.time);
    if (times.length) out[block.dataset.day] = times;
  });
  return out;
}

// shared delegated handler for these widgets — they appear both inside modals (modalRoot)
// and directly in tab content (#content, e.g. Services & Packages), so wire both ancestors.
function handleListSlotWidgetClick(e){
  if (e.target.closest('[data-list-remove]')) { e.target.closest('.list-editor-row').remove(); return; }
  if (e.target.closest('[data-list-add]')) {
    const wrap = e.target.closest('[data-list-editor]');
    const input = wrap.querySelector('[data-list-newitem]');
    if (input.value.trim()) {
      const row = document.createElement('div');
      row.className = 'list-editor-row';
      row.innerHTML = `<input value="${escapeAttr(input.value.trim())}" dir-auto><button type="button" class="btn danger sm" data-list-remove>✕</button>`;
      wrap.querySelector('.add-inline').before(row);
      input.value = '';
    }
    return;
  }
  if (e.target.closest('[data-day-remove]')) { e.target.closest('.day-block').remove(); return; }
  if (e.target.closest('[data-slot-remove]')) { e.target.closest('.slot-chip').remove(); return; }
  if (e.target.closest('[data-slot-add]')) {
    const block = e.target.closest('.day-block');
    const input = block.querySelector('[data-slot-newtime]');
    if (input.value.trim()) {
      const chip = document.createElement('span');
      chip.className = 'slot-chip'; chip.dataset.time = input.value.trim();
      chip.innerHTML = `${escapeHtml(input.value.trim())} <button type="button" data-slot-remove>✕</button>`;
      block.querySelector('.add-inline').before(chip);
      input.value = '';
    }
    return;
  }
  if (e.target.closest('[data-day-add]')) {
    const wrap = e.target.closest('[data-slots-editor]');
    const select = wrap.querySelector('[data-newday-select]');
    const day = select.value;
    if (wrap.querySelector(`.day-block[data-day="${day}"]`)) { toast('info', 'Day already added'); return; }
    const trailingAddInline = wrap.querySelector(':scope > .add-inline');
    const div = document.createElement('div');
    div.innerHTML = dayBlockHTML(day, []);
    trailingAddInline.before(div.firstElementChild);
  }
}
modalRoot.addEventListener('click', handleListSlotWidgetClick);
document.getElementById('content').addEventListener('click', handleListSlotWidgetClick);

async function renderMedia(preserveScroll = false){
  if (preserveScroll) saveScroll();
  try {
    const items = await api('/media');
    setContent(`
      <div class="dropzone" id="dropzone">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size:28px;margin-bottom:10px;display:block"></i>
        Drag & drop images here, or click to choose files<br><small class="muted">JPEG / PNG / WebP, max 5MB each</small>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none">
      </div>
      <div class="media-grid">
        ${items.length ? items.map(mediaItem).join('') : '<div class="empty">No media uploaded yet</div>'}
      </div>`);
    const dz = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    dz.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => uploadFiles(fileInput.files));
    ['dragover', 'dragleave', 'drop'].forEach(evt => dz.addEventListener(evt, e => { e.preventDefault(); dz.classList.toggle('drag', evt === 'dragover'); }));
    dz.addEventListener('drop', e => uploadFiles(e.dataTransfer.files));
    if (preserveScroll) restoreScroll();
  } catch (err) { setContent(errorBlock(err.message)); }
}
TAB_RENDERERS.media = renderMedia;

function mediaItem(m){
  return `<div class="media-item" data-id="${m.id}">
    <img src="${BACKEND_ORIGIN + m.url}" loading="lazy">
    <div class="media-meta">
      <div class="fn">${escapeHtml(m.original_name)}</div>
      <div class="muted">${formatBytes(m.size_bytes)} · ${formatDate(m.uploaded_at)}</div>
    </div>
    <div class="media-actions">
      <button class="btn outline sm" data-action="media-copy" data-url="${escapeAttr(BACKEND_ORIGIN + m.url)}">Copy URL</button>
      <button class="btn danger sm" data-action="media-delete" data-id="${m.id}">Delete</button>
    </div>
  </div>`;
}

async function uploadFiles(fileList){
  if (!fileList.length) return;
  const fd = new FormData();
  Array.from(fileList).forEach(f => fd.append('files', f));
  try { await api('/media/upload', { method: 'POST', body: fd }); toast('success', fileList.length + ' file(s) uploaded'); renderMedia(true); }
  catch (err) { toast('error', err.message); }
}

document.getElementById('content').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'media-copy') {
    try { await navigator.clipboard.writeText(btn.dataset.url); toast('success', 'URL copied'); }
    catch { toast('error', 'Could not copy — copy manually: ' + btn.dataset.url); }
  }
  if (action === 'media-delete') {
    if (!(await confirmDialog('هل أنت متأكد؟ لا يمكن التراجع — Delete this file? If it is used elsewhere on the site, those images will break.'))) return;
    try { await api(`/media/${btn.dataset.id}`, { method: 'DELETE' }); toast('success', 'Deleted'); renderMedia(true); }
    catch (err) { toast('error', err.message); }
  }
});

          <label>Admin Notes — ملاحظات داخلية</label>
          <textarea name="notes" rows="4" dir-auto
            placeholder="ملاحظات خاصة بالعميل أو العربية — لا يراها العميل...">${escapeHtml(customer?.notes || '')}</textarea>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn primary">
            <i class="fa-solid fa-floppy-disk"></i> Save Customer
          </button>
        </div>
      </form>
    </div>`);

  const top = modalRoot.lastElementChild;
  top.querySelector('[data-close]').onclick = closeTopModal;

  // Live VIN validation (only for new customer)
  if (!isEdit) {
    const vinInput = top.querySelector('[name="vin"]');
    vinInput.addEventListener('input', () => {
      vinInput.value = vinInput.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, '');
      const field = document.getElementById('vinField');
      const isValid = vinInput.value.length === 0 || vinInput.value.length === 17;
      field.classList.toggle('invalid', !isValid);
    });
  }

  top.querySelector('#custForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const vin = fd.get('vin').toUpperCase().trim();

    if (!isEdit && (vin.length !== 17 || /[IOQ]/.test(vin))) {
      document.getElementById('vinField').classList.add('invalid');
      return;
    }

    const payload = {
      vin,
      customer_name: fd.get('customer_name').trim(),
      customer_phone: fd.get('customer_phone').trim(),
      car_model: fd.get('car_model').trim(),
      total_spent_egp: Number(fd.get('total_spent_egp')) || 0,
      car_status: fd.get('car_status'),
      last_service_date: fd.get('last_service_date') || null,
      notes: fd.get('notes').trim()
    };

    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    try {
      if (isEdit) {
        await api(`/customers/${customer.id}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await api('/customers', { method: 'POST', body: JSON.stringify(payload) });
      }
      showModalSuccessBanner(top, isEdit ? 'Customer updated ✓' : 'Customer added ✓');
      renderCustomers(true);
      if (isEdit) setTimeout(closeTopModal, 1500);
      else e.target.reset();
    } catch (err) {
      toast('error', err.message);
    } finally {
      submitBtn.disabled = false;
    }
  });
}

document.getElementById('content').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if (action === 'cust-add') { openCustomerModal(null); return; }

  if (action === 'cust-edit') {
    const customer = cachedCustomers.find(c => String(c.id) === id);
    if (customer) openCustomerModal(customer);
    return;
  }

  if (action === 'cust-toggle-status') {
    const c = cachedCustomers.find(x => String(x.id) === id);
    if (!c) return;
    const newStatus = c.car_status === 'in_service' ? 'ready' : 'in_service';
    try {
      await api(`/customers/${id}`, { method: 'PUT', body: JSON.stringify({ car_status: newStatus }) });
      toast('success', newStatus === 'ready' ? '✅ تم تحديث الحالة: جاهزة' : '🔧 تم تحديث الحالة: في الصيانة');
      renderCustomers(true);
    } catch (err) { toast('error', err.message); }
    return;
  }

  if (action === 'cust-delete') {
    const c = cachedCustomers.find(x => String(x.id) === id);
    if (!(await confirmDialog(`هل أنت متأكد من حذف هذا العميل؟\nVIN: ${c?.vin}\n\nلا يمكن التراجع.`))) return;
    try {
      await api(`/customers/${id}`, { method: 'DELETE' });
      toast('success', 'Customer deleted');
      renderCustomers(true);
    } catch (err) { toast('error', err.message); }
  }
});

// ═══════════════════════ CATALOG: SERIES & ENGINES (spare-parts.html) ═══════════════════════
let cachedSeries = [];
let cachedEngineMap = {};

async function renderCatalog(preserveScroll = false){
  if (preserveScroll) saveScroll();
  try {
    const [seriesRes, engineRes] = await Promise.all([
      api('/service-config/catalog_series'),
      api('/service-config/catalog_engine_map')
    ]);
    cachedSeries = seriesRes.value || [];
    cachedEngineMap = engineRes.value || {};
    window.cachedSeries = cachedSeries;
    window.catalogDataLoaded = true;
    setContent(`
      <p class="muted" style="margin-bottom:20px">This data drives the Series → Model → Engine drill-down on spare-parts.html. "Keywords" are the substrings matched against BMW model/trim names (e.g. "330i" matches series "3" and engine "B58").</p>
      <div class="panel">
        <div class="toolbar"><h3 style="margin:0">BMW Series</h3><button class="btn primary sm" data-action="series-add" style="margin-right:auto"><i class="fa-solid fa-plus"></i> Add Series</button></div>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Tag</th><th>Color</th><th>Keywords</th><th>Actions</th></tr></thead>
          <tbody>${cachedSeries.length ? cachedSeries.map(seriesRow).join('') : '<tr><td colspan="6" class="empty">No series defined yet</td></tr>'}</tbody>
        </table>
      </div>
      <div class="panel">
        <div class="toolbar"><h3 style="margin:0">Engine Map</h3><button class="btn primary sm" data-action="engine-add" style="margin-right:auto"><i class="fa-solid fa-plus"></i> Add Engine</button></div>
        <table class="data-table">
          <thead><tr><th>Engine Code</th><th>Matches (keywords)</th><th>Actions</th></tr></thead>
          <tbody>${Object.keys(cachedEngineMap).length ? Object.entries(cachedEngineMap).map(engineRow).join('') : '<tr><td colspan="3" class="empty">No engines defined yet</td></tr>'}</tbody>
        </table>
      </div>`);
    if (preserveScroll) restoreScroll();
  } catch (err) {
    setContent(errorBlock(err.message));
  }
}
TAB_RENDERERS.catalog = renderCatalog;

function seriesRow(s){
  return `<tr data-id="${escapeAttr(s.id)}">
    <td style="font-family:'Bebas Neue';font-size:18px">${escapeHtml(s.id)}</td>
    <td>${escapeHtml(s.name)}</td>
    <td>${escapeHtml(s.tag || '')}</td>
    <td><span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:${escapeAttr(s.tagColor || '#888')};vertical-align:middle;margin-right:6px"></span><span class="muted" style="font-size:12px">${escapeHtml(s.tagColor || '')}</span></td>
    <td>${(s.keywords || []).slice(0, 6).map(k => `<span class="tag-chip">${escapeHtml(k)}</span>`).join('')}${(s.keywords || []).length > 6 ? `<span class="muted">+${s.keywords.length - 6} more</span>` : ''}</td>
    <td><button class="btn outline sm" data-action="series-edit" data-id="${escapeAttr(s.id)}">Edit</button> <button class="btn danger sm" data-action="series-delete" data-id="${escapeAttr(s.id)}">Delete</button></td>
  </tr>`;
}
function engineRow([code, keywords]){
  return `<tr data-id="${escapeAttr(code)}">
    <td style="font-family:'Bebas Neue';font-size:18px">${escapeHtml(code)}</td>
    <td>${(keywords || []).slice(0, 8).map(k => `<span class="tag-chip">${escapeHtml(k)}</span>`).join('')}${(keywords || []).length > 8 ? `<span class="muted">+${keywords.length - 8} more</span>` : ''}</td>
    <td><button class="btn outline sm" data-action="engine-edit" data-id="${escapeAttr(code)}">Edit</button> <button class="btn danger sm" data-action="engine-delete" data-id="${escapeAttr(code)}">Delete</button></td>
  </tr>`;
}

async function saveCatalogSeries(){
  await api('/service-config/catalog_series', { method: 'PUT', body: JSON.stringify({ value: cachedSeries }) });
  window.cachedSeries = cachedSeries;
  window.catalogDataLoaded = true;
}
async function saveEngineMap(){
  await api('/service-config/catalog_engine_map', { method: 'PUT', body: JSON.stringify({ value: cachedEngineMap }) });
}

function openSeriesModal(series){
  const isEdit = !!series;
  openModal(`
    <div class="modal-box">
      <div class="modal-head"><h3>${isEdit ? 'Edit' : 'Add'} BMW Series</h3><button class="modal-x" data-close>✕</button></div>
      <form class="modal-body" id="seriesForm">
        <div class="form-grid2">
          <div class="form-field"><label>Series ID (short code, e.g. 3, X, M)</label>
            <input name="id" required maxlength="4" value="${escapeAttr(series?.id || '')}" ${isEdit ? 'readonly style="opacity:.6;cursor:not-allowed"' : ''}>
          </div>
          <div class="form-field"><label>Name</label><input name="name" required value="${escapeAttr(series?.name || '')}" placeholder="3 Series"></div>
          <div class="form-field"><label>Tag Label</label><input name="tag" value="${escapeAttr(series?.tag || '')}" placeholder="Most Popular"></div>
          <div class="form-field"><label>Tag Color (CSS color or hex)</label><input name="tagColor" value="${escapeAttr(series?.tagColor || '#1c6cfc')}" placeholder="#1c6cfc"></div>
        </div>
        <div class="form-field"><label>Keywords (model/trim substrings that belong to this series)</label>${listEditorHTML(series?.keywords)}</div>
        <div class="modal-actions"><button type="submit" class="btn primary">Save</button></div>
      </form>
    </div>`);
  const top = modalRoot.lastElementChild;
  top.querySelector('[data-close]').onclick = closeTopModal;
  top.querySelector('#seriesForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const id = fd.get('id').trim();
    if (!isEdit && cachedSeries.some(s => s.id.toLowerCase() === id.toLowerCase())) {
      toast('error', `Series "${id}" already exists`); return;
    }
    const updated = {
      id, name: fd.get('name').trim(), tag: fd.get('tag').trim(), tagColor: fd.get('tagColor').trim(),
      keywords: collectListEditor(e.target.querySelector('[data-list-editor]'))
    };
    if (isEdit) {
      const idx = cachedSeries.findIndex(s => s.id === series.id);
      cachedSeries[idx] = updated;
    } else {
      cachedSeries.push(updated);
    }
    try {
      await saveCatalogSeries();
      showModalSuccessBanner(top, isEdit ? 'Series updated ✓' : 'Series added ✓');
      renderCatalog(true);
      if (isEdit) {
        setTimeout(closeTopModal, 1500);
      } else {
        e.target.reset();
        const listWrap = e.target.querySelector('[data-list-editor]');
        if (listWrap) listWrap.outerHTML = listEditorHTML([]);
      }
    } catch (err) { toast('error', err.message); }
  });
}

function openEngineModal(code, keywords){
  const isEdit = !!code;
  openModal(`
    <div class="modal-box">
      <div class="modal-head"><h3>${isEdit ? 'Edit' : 'Add'} Engine</h3><button class="modal-x" data-close>✕</button></div>
      <form class="modal-body" id="engineForm">
        <div class="form-field"><label>Engine Code</label>
          <input name="code" required maxlength="10" style="font-family:monospace;text-transform:uppercase" value="${escapeAttr(code || '')}" ${isEdit ? 'readonly style="opacity:.6;cursor:not-allowed;font-family:monospace"' : ''}>
        </div>
        <div class="form-field"><label>Keywords (model/trim substrings that use this engine)</label>${listEditorHTML(keywords)}</div>
        <div class="modal-actions"><button type="submit" class="btn primary">Save</button></div>
      </form>
    </div>`);
  const top = modalRoot.lastElementChild;
  top.querySelector('[data-close]').onclick = closeTopModal;
  top.querySelector('#engineForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const newCode = fd.get('code').trim().toUpperCase();
    if (!isEdit && cachedEngineMap[newCode]) { toast('error', `Engine "${newCode}" already exists`); return; }
    cachedEngineMap[newCode] = collectListEditor(e.target.querySelector('[data-list-editor]'));
    try {
      await saveEngineMap();
      showModalSuccessBanner(top, isEdit ? 'Engine updated ✓' : 'Engine added ✓');
      renderCatalog(true);
      if (isEdit) {
        setTimeout(closeTopModal, 1500);
      } else {
        e.target.reset();
        const listWrap = e.target.querySelector('[data-list-editor]');
        if (listWrap) listWrap.outerHTML = listEditorHTML([]);
      }
    } catch (err) { toast('error', err.message); }
  });
}

document.getElementById('content').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if (action === 'series-add') { openSeriesModal(null); return; }
  if (action === 'series-edit') { openSeriesModal(cachedSeries.find(s => s.id === id)); return; }
  if (action === 'series-delete') {
    if (!(await confirmDialog(`Delete series "${id}"? This cannot be undone.`))) return;
    cachedSeries = cachedSeries.filter(s => s.id !== id);
    try { await saveCatalogSeries(); toast('success', 'Series deleted'); renderCatalog(true); }
    catch (err) { toast('error', err.message); }
    return;
  }
  if (action === 'engine-add') { openEngineModal(null, []); return; }
  if (action === 'engine-edit') { openEngineModal(id, cachedEngineMap[id]); return; }
  if (action === 'engine-delete') {
    if (!(await confirmDialog(`Delete engine "${id}"? This cannot be undone.`))) return;
    delete cachedEngineMap[id];
    try { await saveEngineMap(); toast('success', 'Engine deleted'); renderCatalog(true); }
    catch (err) { toast('error', err.message); }
  }
});

// ═══════════════════════ BOOTSTRAP ═══════════════════════
if (isAuthed()) showApp(); else showLogin();
</script>
